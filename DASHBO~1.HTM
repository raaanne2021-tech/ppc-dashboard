<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PPC — Dashboard</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<script>if (sessionStorage.getItem('ppc_auth') !== 'true') window.location.href = 'index.html';</script>

<div class="layout">
  <!-- Sidebar -->
  <aside class="sidebar">
    <div class="sidebar-logo">
      <div class="brand">Platinum Premier</div>
      <div class="name">Construction</div>
    </div>
    <nav>
      <a href="dashboard.html" class="active"><span class="icon">🏠</span> Dashboard</a>
      <a href="projects.html"><span class="icon">🏗️</span> Projects</a>
      <a href="sops.html"><span class="icon">📋</span> SOPs &amp; Playbooks</a>
      <a href="links.html"><span class="icon">🔗</span> Quick Links</a>
    </nav>
    <div class="sidebar-footer">
      <a href="index.html" onclick="sessionStorage.clear()">Sign out</a>
    </div>
  </aside>

  <!-- Main -->
  <div class="main">
    <div class="topbar">
      <h1>Dashboard</h1>
      <div class="meta">
        <span id="date-display"></span>
        <span id="time-display"></span>
      </div>
    </div>

    <div class="content">

      <!-- Stats row -->
      <div class="grid-4 mb-24" id="stats-row">
        <div class="stat-tile">
          <div class="num" id="stat-active">—</div>
          <div class="label">Active Projects</div>
        </div>
        <div class="stat-tile">
          <div class="num" id="stat-tasks">—</div>
          <div class="label">Open Tasks</div>
        </div>
        <div class="stat-tile">
          <div class="num" id="stat-done">—</div>
          <div class="label">Done Today</div>
        </div>
        <div class="stat-tile">
          <div class="num" id="stat-overdue" style="color:#dc2626">—</div>
          <div class="label">Overdue</div>
        </div>
      </div>

      <div class="grid-2 mb-24">

        <!-- Today's Tasks -->
        <div class="card">
          <div class="card-header">
            <span class="card-title">✅ Today's Tasks</span>
            <button class="btn btn-outline btn-sm" onclick="addTask()">+ Add</button>
          </div>
          <div class="card-body" style="padding:0">
            <ul class="checklist" id="task-list" style="padding:0 20px"></ul>
          </div>
        </div>

        <!-- Priorities This Week -->
        <div class="card">
          <div class="card-header">
            <span class="card-title">🎯 Priorities This Week</span>
            <button class="btn btn-outline btn-sm" onclick="addPriority()">+ Add</button>
          </div>
          <div class="card-body" style="padding:0">
            <ul class="checklist" id="priority-list" style="padding:0 20px"></ul>
          </div>
        </div>

      </div>

      <!-- Quick Notes -->
      <div class="card mb-24">
        <div class="card-header">
          <span class="card-title">📝 Quick Notes</span>
          <button class="btn btn-outline btn-sm" onclick="saveNotes()">Save</button>
        </div>
        <div class="card-body">
          <textarea id="notes-area" placeholder="Jot down anything for the team…" style="width:100%;min-height:100px;border:none;outline:none;resize:vertical;font-family:inherit;font-size:0.9rem;line-height:1.6;color:#1a1a1a"></textarea>
        </div>
      </div>

      <!-- Recent Activity -->
      <div class="card">
        <div class="card-header">
          <span class="card-title">⚡ Before You Leave</span>
        </div>
        <div class="card-body" style="padding:0">
          <ul class="checklist" id="eod-list" style="padding:0 20px">
            <li><input type="checkbox" id="eod1"><label for="eod1">Send EOD report to Pedro</label></li>
            <li><input type="checkbox" id="eod2"><label for="eod2">Update JobTread job notes</label></li>
            <li><input type="checkbox" id="eod3"><label for="eod3">Log daily recap in Notion</label></li>
            <li><input type="checkbox" id="eod4"><label for="eod4">Reply to any unread client emails</label></li>
            <li><input type="checkbox" id="eod5"><label for="eod5">Update QuickBooks if invoices sent</label></li>
          </ul>
        </div>
      </div>

    </div>
  </div>
</div>

<!-- Add Task Modal -->
<div class="modal-overlay" id="task-modal">
  <div class="modal">
    <h3>Add Task</h3>
    <input type="text" id="task-input" placeholder="What needs to be done?">
    <div class="modal-actions">
      <button class="btn btn-outline" onclick="closeModal('task-modal')">Cancel</button>
      <button class="btn btn-primary" onclick="saveTask()">Add Task</button>
    </div>
  </div>
</div>

<!-- Add Priority Modal -->
<div class="modal-overlay" id="priority-modal">
  <div class="modal">
    <h3>Add Weekly Priority</h3>
    <input type="text" id="priority-input" placeholder="What's a key goal this week?">
    <div class="modal-actions">
      <button class="btn btn-outline" onclick="closeModal('priority-modal')">Cancel</button>
      <button class="btn btn-primary" onclick="savePriority()">Add Priority</button>
    </div>
  </div>
</div>

<script>
// ── Auth check ──
if (sessionStorage.getItem('ppc_auth') !== 'true') window.location.href = 'index.html';

// ── Date / time ──
function updateClock() {
  const now = new Date();
  document.getElementById('date-display').textContent = now.toLocaleDateString('en-US', { weekday:'long', month:'long', day:'numeric' });
  document.getElementById('time-display').textContent = now.toLocaleTimeString('en-US', { hour:'numeric', minute:'2-digit' });
}
updateClock();
setInterval(updateClock, 60000);

// ── Storage keys (daily reset) ──
const TODAY = new Date().toDateString();
function key(k) { return 'ppc_' + k + '_' + TODAY; }
function globalKey(k) { return 'ppc_' + k; }

// ── Tasks ──
let tasks = JSON.parse(localStorage.getItem(key('tasks')) || '[]');
function saveTasks() { localStorage.setItem(key('tasks'), JSON.stringify(tasks)); updateStats(); }

function renderTasks() {
  const ul = document.getElementById('task-list');
  if (tasks.length === 0) {
    ul.innerHTML = '<li style="color:#aaa;padding:16px 0">No tasks yet — click + Add</li>';
    return;
  }
  ul.innerHTML = tasks.map((t, i) => `
    <li>
      <input type="checkbox" id="t${i}" ${t.done ? 'checked' : ''} onchange="toggleTask(${i})">
      <label for="t${i}">${escHtml(t.text)}</label>
      <button onclick="removeTask(${i})" style="background:none;border:none;cursor:pointer;color:#ccc;font-size:1rem;padding:0 4px;margin-left:auto" title="Remove">×</button>
    </li>
  `).join('');
}

function toggleTask(i) { tasks[i].done = !tasks[i].done; saveTasks(); renderTasks(); }
function removeTask(i) { tasks.splice(i, 1); saveTasks(); renderTasks(); }
function addTask() { document.getElementById('task-input').value = ''; openModal('task-modal'); setTimeout(()=>document.getElementById('task-input').focus(),100); }
function saveTask() {
  const v = document.getElementById('task-input').value.trim();
  if (v) { tasks.push({ text: v, done: false }); saveTasks(); renderTasks(); }
  closeModal('task-modal');
}

// ── Priorities ──
let priorities = JSON.parse(localStorage.getItem(globalKey('priorities')) || '["Finish all SOPs","Share playbooks with Pedro","Reconcile QuickBooks","Set up BNI CRM database","Review JobTread transition"]');
function savePriorities() { localStorage.setItem(globalKey('priorities'), JSON.stringify(priorities)); updateStats(); }

function renderPriorities() {
  const ul = document.getElementById('priority-list');
  if (priorities.length === 0) {
    ul.innerHTML = '<li style="color:#aaa;padding:16px 0">No priorities yet — click + Add</li>';
    return;
  }
  const doneKey = key('prio_done');
  const done = JSON.parse(localStorage.getItem(doneKey) || '[]');
  ul.innerHTML = priorities.map((p, i) => `
    <li>
      <input type="checkbox" id="p${i}" ${done.includes(i) ? 'checked' : ''} onchange="togglePriority(${i})">
      <label for="p${i}">${escHtml(p)}</label>
      <button onclick="removePriority(${i})" style="background:none;border:none;cursor:pointer;color:#ccc;font-size:1rem;padding:0 4px;margin-left:auto" title="Remove">×</button>
    </li>
  `).join('');
}

function togglePriority(i) {
  const doneKey = key('prio_done');
  const done = JSON.parse(localStorage.getItem(doneKey) || '[]');
  const idx = done.indexOf(i);
  if (idx === -1) done.push(i); else done.splice(idx, 1);
  localStorage.setItem(doneKey, JSON.stringify(done));
  renderPriorities(); updateStats();
}
function removePriority(i) { priorities.splice(i, 1); savePriorities(); renderPriorities(); }
function addPriority() { document.getElementById('priority-input').value = ''; openModal('priority-modal'); setTimeout(()=>document.getElementById('priority-input').focus(),100); }
function savePriority() {
  const v = document.getElementById('priority-input').value.trim();
  if (v) { priorities.push(v); savePriorities(); renderPriorities(); }
  closeModal('priority-modal');
}

// ── Notes ──
const savedNotes = localStorage.getItem(globalKey('notes')) || '';
document.getElementById('notes-area').value = savedNotes;
function saveNotes() { localStorage.setItem(globalKey('notes'), document.getElementById('notes-area').value); }

// ── Stats ──
function updateStats() {
  const active = JSON.parse(localStorage.getItem('ppc_projects') || '[]').filter(p => p.status === 'Active').length;
  const open = tasks.filter(t => !t.done).length;
  const done = tasks.filter(t => t.done).length;
  const overdue = JSON.parse(localStorage.getItem('ppc_projects') || '[]').filter(p => p.overdue).length;
  document.getElementById('stat-active').textContent = active || '—';
  document.getElementById('stat-tasks').textContent = open;
  document.getElementById('stat-done').textContent = done;
  document.getElementById('stat-overdue').textContent = overdue || '0';
}

// ── Modal helpers ──
function openModal(id) { document.getElementById(id).classList.add('open'); }
function closeModal(id) { document.getElementById(id).classList.remove('open'); }
document.querySelectorAll('.modal-overlay').forEach(m => m.addEventListener('click', e => { if (e.target === m) m.classList.remove('open'); }));
document.addEventListener('keydown', e => { if (e.key === 'Enter') { if (document.getElementById('task-modal').classList.contains('open')) saveTask(); if (document.getElementById('priority-modal').classList.contains('open')) savePriority(); } if (e.key === 'Escape') document.querySelectorAll('.modal-overlay').forEach(m => m.classList.remove('open')); });

function escHtml(s) { return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

// ── Init ──
renderTasks();
renderPriorities();
updateStats();
</script>
</body>
</html>
